name: Frontend Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-production
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
  AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET || secrets.AWS_S3_BUCKET }}
  AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID || secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
  VITE_WS_BASE_URL: ${{ vars.VITE_WS_BASE_URL || secrets.VITE_WS_BASE_URL }}

jobs:
  build-and-deploy:
    name: Build and deploy frontend to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deploy configuration
        run: |
          set -e
          test -n "$AWS_REGION" || (echo "AWS_REGION is required." && exit 1)
          test -n "$AWS_S3_BUCKET" || (echo "AWS_S3_BUCKET is required." && exit 1)
          test -n "$AWS_CLOUDFRONT_DISTRIBUTION_ID" || (echo "AWS_CLOUDFRONT_DISTRIBUTION_ID is required." && exit 1)
          test -n "$VITE_API_BASE_URL" || (echo "VITE_API_BASE_URL is required." && exit 1)
          test -n "$VITE_WS_BASE_URL" || (echo "VITE_WS_BASE_URL is required." && exit 1)

      - name: Build frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload hashed assets to S3
        run: |
          aws s3 sync dist/ "s3://$AWS_S3_BUCKET/" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html without browser cache
        run: |
          aws s3 cp dist/index.html "s3://$AWS_S3_BUCKET/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$AWS_CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
